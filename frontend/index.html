<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Humanoid AI - Real-Time Human Avatar</title>
    <link rel="stylesheet" href="frontend/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Three.js and Loaders -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="app-container">
        <div id="avatar-container">
            <!-- Three.js Canvas will be injected here -->
        </div>

        <div id="ui-panel">
            <div class="card">
                <h1>Humanoid AI</h1>
                <div id="status-badge" class="status-badge">
                    <div class="status-dot"></div>
                    <span id="status-text">System Ready</span>
                </div>
                
                <div class="controls">
                    <button id="start-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                        Start Listening
                    </button>
                    <button id="stop-btn" disabled>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h12v12H6z"/></svg>
                        Stop
                    </button>
                </div>
            </div>

            <div class="card" style="flex: 1;">
                <h3>Live Insights</h3>
                <div class="insight-row">
                    <span>Emotion</span>
                    <strong id="emotion-val" class="emotion-display">Neutral</strong>
                </div>
                <div class="insight-row">
                    <span>Language</span>
                    <strong id="language-val">Waiting</strong>
                </div>
                <audio id="voice-playback" controls hidden></audio>
                <div id="transcript" class="transcript-area">
                    Waiting for speech...
                </div>
                <div id="english-transcript" class="transcript-area english-area">
                    English conversion will appear here.
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="frontend/main.js"></script>
</body>
</html>
