<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speech to Emotion AI</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <h1>🎙️ Speech to Emotion</h1>
    <p class="subtitle">Analyze your voice and detect emotions in real-time</p>

    <div class="card">
        <button class="start-btn" onclick="start()">Start Recording</button>
        <button class="stop-btn" onclick="stop()" id="stopBtn" disabled>Stop</button>

        <div class="wave" id="wave">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>

        <div class="status">
            <span id="statusText">Idle</span>
        </div>

        <p id="result">Your emotion will appear here...</p>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
